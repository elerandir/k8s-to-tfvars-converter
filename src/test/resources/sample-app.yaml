apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: app
          image: example/app:1.0
          env:
            # how chatty the logs are
            - name: LOG_LEVEL
              value: info
            - name: DATABASE_URL # primary database
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: database_url
            - name: FEATURE_FLAGS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: feature_flags
            # token for the upstream API
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: api_token
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          # envFrom imports the whole ConfigMap/Secret; with "explicit refs only"
          # these are skipped, so unused_key never appears in the output.
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
              prefix: SECRET_
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  database_url: postgres://db:5432/app
  # comma-separated feature toggles
  feature_flags: "a,b,c"
  unused_key: not-referenced-anywhere
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
data:
  api_token: czNjcjN0LXRva2Vu
stringData:
  smtp_password: hunter2
