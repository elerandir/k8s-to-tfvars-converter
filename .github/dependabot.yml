version: 2
updates:
  # Keep Gradle dependencies (SnakeYAML, picocli, JUnit) patched.
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # Keep GitHub Actions current. Combined with this, pins can later be migrated
  # to commit SHAs and Dependabot will continue to bump them.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
