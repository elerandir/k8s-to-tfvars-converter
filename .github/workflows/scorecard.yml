# OpenSSF Scorecard: scores the repository's security posture (branch
# protection, pinned dependencies, token permissions, etc.) and uploads
# findings to code scanning.
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '21 5 * * 1'
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write # required to publish results to the OpenSSF API
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run analysis
        # Pin a real release: ossf/scorecard-action has no floating major (v2) tag.
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to the public OpenSSF API (this repo is public),
          # which powers the Scorecard badge. Requires `id-token: write`.
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
