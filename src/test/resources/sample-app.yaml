apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: app
          image: example/app:1.0
          env:
            # how chatty the logs are
            - name: LOG_LEVEL
              value: info
            - name: DATABASE_URL # primary database
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: database_url
            # token for the upstream API
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: api_token
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
              prefix: SECRET_
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  database_url: postgres://db:5432/app
  # comma-separated feature toggles
  feature_flags: "a,b,c"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
data:
  api_token: czNjcjN0LXRva2Vu
stringData:
  # used by the mailer
  smtp_password: hunter2
